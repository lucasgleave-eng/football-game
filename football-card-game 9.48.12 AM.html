<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>higher or lower — football</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch-1:#1f8a4c;
    --pitch-2:#1c7e46;
    --pitch-dark:#0a3f23;
    --stadium:#06231a;
    --line:rgba(255,255,255,0.55);
    --gold:#f5c542;
    --gold-dim:#c9a02f;
    --ink:#0a1410;
    --white:#f3f7f2;
    --muted:#9fb3a6;
    --good:#34d27b;
    --bad:#ff5a5f;
    --card:#10231a;
    --display:'Bebas Neue',Impact,sans-serif;
    --sans:'Archivo',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--white);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(245,197,66,0.10), transparent 55%),
      radial-gradient(140% 120% at 50% 120%, #041710, var(--stadium) 70%);
    min-height:100%;display:flex;flex-direction:column;align-items:center;
    padding:18px 14px 30px;overflow-x:hidden;
  }

  /* ---------- pitch (chunky 8-bit) ---------- */
  .pitch{
    position:fixed;inset:0;z-index:-1;
    background:
      repeating-linear-gradient(0deg, var(--pitch-1) 0 72px, var(--pitch-2) 72px 144px);
    image-rendering:pixelated;opacity:.97;
    -webkit-mask-image:radial-gradient(120% 100% at 50% 50%, #000 55%, transparent 92%);
    mask-image:radial-gradient(120% 100% at 50% 50%, #000 55%, transparent 92%);
  }
  .markings{position:fixed;inset:0;z-index:-1;pointer-events:none}
  .markings .halfway{position:absolute;left:5%;right:5%;top:50%;height:5px;background:var(--line);transform:translateY(-50%)}
  .markings .circle{position:absolute;left:50%;top:50%;width:200px;height:200px;border:5px solid var(--line);border-radius:50%;transform:translate(-50%,-50%)}
  .markings .spot{position:absolute;left:50%;top:50%;width:11px;height:11px;background:var(--line);transform:translate(-50%,-50%)}
  .markings .box{position:absolute;left:50%;transform:translateX(-50%);width:min(58%,360px);border:5px solid var(--line);border-top:none;border-bottom:none}
  .markings .box.top{top:0;height:120px;border-top:none;border-bottom:5px solid var(--line)}
  .markings .box.bot{bottom:0;height:120px;border-bottom:none;border-top:5px solid var(--line)}
  .markings .sixyd{position:absolute;left:50%;transform:translateX(-50%);width:min(30%,180px);height:56px;border:5px solid var(--line)}
  .markings .sixyd.top{top:0;border-top:none}
  .markings .sixyd.bot{bottom:0;border-bottom:none}
  .vignette{position:fixed;inset:0;z-index:-1;background:radial-gradient(130% 100% at 50% 50%, transparent 42%, rgba(2,15,10,.78) 100%);pointer-events:none}

  /* ---------- the kickabout (pixel players) ---------- */
  .matchlayer{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.6}
  .player{position:absolute;left:0;top:0;width:44px;will-change:transform}
  .player .flip{display:block;transition:transform .08s linear}
  .player svg{display:block;width:100%;height:auto;shape-rendering:crispEdges;image-rendering:pixelated;
    filter:drop-shadow(0 3px 0 rgba(0,0,0,.3))}
  .kitc{fill:var(--kit)} .kitsh{fill:var(--kitsh)} .sockc{fill:var(--sock)}
  .leg-b{opacity:0}
  .running .leg-a{animation:legA .2s steps(1) infinite}
  .running .leg-b{animation:legB .2s steps(1) infinite}
  @keyframes legA{0%,49.9%{opacity:1}50%,100%{opacity:0}}
  @keyframes legB{0%,49.9%{opacity:0}50%,100%{opacity:1}}
  .ball{position:absolute;left:0;top:0;width:14px;will-change:transform}
  .ball svg{display:block;width:100%;height:auto;shape-rendering:crispEdges;
    filter:drop-shadow(0 2px 0 rgba(0,0,0,.35))}
  @media(prefers-reduced-motion:reduce){
    .running .leg-a,.running .leg-b{animation:none!important}
    .leg-b{opacity:0}
  }

  /* ---------- header ---------- */
  header{width:100%;max-width:760px;text-align:center;margin-bottom:6px}
  .kicker{font-family:var(--display);letter-spacing:.12em;color:var(--gold);font-size:18px}
  h1{font-family:var(--display);font-size:clamp(40px,9vw,68px);line-height:.86;letter-spacing:.01em;
     text-shadow:0 3px 0 rgba(0,0,0,.35)}
  h1 em{color:var(--gold);font-style:normal}

  /* scoreboard */
  .scores{display:flex;gap:10px;justify-content:center;margin:14px 0 10px;width:100%;max-width:520px}
  .score{
    flex:1;background:rgba(4,22,15,.72);border:1px solid rgba(255,255,255,.12);
    border-radius:12px;padding:8px 6px;backdrop-filter:blur(4px);
  }
  .score .lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .score .val{font-family:var(--display);font-size:34px;line-height:1;margin-top:2px}
  .score.best .val{color:var(--gold)}

  /* ---------- question ---------- */
  .question{
    font-family:var(--display);font-size:clamp(22px,5vw,32px);letter-spacing:.04em;
    text-align:center;margin:6px 0 16px;min-height:38px;
  }
  .question .stat{color:var(--gold)}
  .question .dir{text-decoration:underline;text-underline-offset:4px}

  /* ---------- arena ---------- */
  .arena{display:flex;align-items:stretch;justify-content:center;gap:14px;width:100%;max-width:720px}
  @media(max-width:520px){.arena{gap:8px}}

  .vs{
    align-self:center;font-family:var(--display);font-size:30px;color:var(--ink);
    background:radial-gradient(circle at 35% 30%, #ffe388, var(--gold) 60%, var(--gold-dim));
    width:54px;height:54px;flex:0 0 54px;border-radius:50%;display:grid;place-items:center;
    box-shadow:0 0 0 4px rgba(245,197,66,.18),0 8px 20px rgba(0,0,0,.4);
  }
  @media(max-width:520px){.vs{width:40px;height:40px;flex-basis:40px;font-size:22px}}

  /* ---------- card ---------- */
  .card{
    flex:1 1 0;min-width:0;cursor:pointer;border:none;text-align:left;color:var(--white);
    background:
      linear-gradient(160deg, rgba(255,255,255,.06), transparent 40%),
      linear-gradient(180deg, #143124, var(--card));
    border:1px solid rgba(255,255,255,.14);border-radius:18px;
    padding:16px 14px 14px;position:relative;overflow:hidden;
    transition:transform .12s ease, box-shadow .2s ease, border-color .2s ease;
    box-shadow:0 14px 30px rgba(0,0,0,.45);
  }
  .card:hover:not(.locked){transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.55)}
  .card:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
  .card.locked{cursor:default}
  .card::after{ /* glossy corner */
    content:"";position:absolute;top:-40px;right:-40px;width:120px;height:120px;
    background:radial-gradient(circle, rgba(245,197,66,.18), transparent 70%);
  }
  .card.right{border-color:var(--good);box-shadow:0 0 0 2px var(--good),0 16px 40px rgba(52,210,123,.35)}
  .card.wrong{border-color:var(--bad);box-shadow:0 0 0 2px var(--bad),0 16px 40px rgba(255,90,95,.3);opacity:.85}

  .c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .pos{font-family:var(--display);font-size:18px;letter-spacing:.06em;color:var(--gold);line-height:1}
  .pos small{display:block;font-family:var(--sans);font-size:9px;letter-spacing:.16em;color:var(--muted);font-weight:700;margin-top:3px}
  .nation{font-family:var(--display);font-size:18px;letter-spacing:.08em;
    background:rgba(255,255,255,.1);border-radius:7px;padding:3px 8px}

  .avatar{
    width:84px;height:84px;margin:6px auto 10px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #2f5e44, #0c2418);
    border:2px solid rgba(245,197,66,.4);display:grid;place-items:center;
    font-family:var(--display);font-size:34px;color:var(--white);letter-spacing:.02em;
  }
  @media(max-width:520px){.avatar{width:64px;height:64px;font-size:26px}}

  .name{font-family:var(--display);font-size:clamp(20px,4.6vw,30px);letter-spacing:.02em;text-align:center;line-height:.95;min-height:30px}

  .statbox{
    margin-top:12px;text-align:center;background:rgba(0,0,0,.28);border-radius:12px;padding:9px 6px;
    border:1px solid rgba(255,255,255,.08);
  }
  .statbox .sname{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .statbox .sval{font-family:var(--display);font-size:46px;line-height:.9;margin-top:2px}
  .statbox .sval.q{color:var(--gold)}
  .statbox .sval.pop{animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1)}}

  /* ---------- footer / controls ---------- */
  .result{text-align:center;font-family:var(--display);font-size:26px;letter-spacing:.04em;min-height:30px;margin:16px 0 4px}
  .result.good{color:var(--good)} .result.bad{color:var(--bad)}
  .next{
    display:block;margin:6px auto 0;font-family:var(--display);font-size:22px;letter-spacing:.08em;color:var(--ink);
    background:linear-gradient(180deg,#ffe388,var(--gold));border:none;border-radius:12px;
    padding:11px 30px;cursor:pointer;box-shadow:0 8px 18px rgba(245,197,66,.3);transition:.12s;
    visibility:hidden;
  }
  .next:hover{transform:translateY(-2px)} .next:active{transform:translateY(0)}
  .next.show{visibility:visible}

  .note{margin-top:22px;font-size:11px;color:var(--muted);text-align:center;max-width:520px;line-height:1.5}
  .note code{font-family:ui-monospace,monospace;color:var(--gold);background:rgba(0,0,0,.3);padding:1px 6px;border-radius:5px}
</style>
</head>
<body>
  <div class="pitch"></div>
  <div class="markings">
    <div class="box top"></div><div class="box bot"></div>
    <div class="sixyd top"></div><div class="sixyd bot"></div>
    <div class="halfway"></div><div class="circle"></div><div class="spot"></div>
  </div>
  <div class="matchlayer" id="match"></div>
  <div class="vignette"></div>

  <header>
    <div class="kicker">matchday quiz</div>
    <h1>higher or <em>lower</em></h1>
  </header>

  <div class="scores">
    <div class="score"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
    <div class="score"><div class="lbl">Streak</div><div class="val" id="streak">0</div></div>
    <div class="score best"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
  </div>

  <div class="question" id="question"></div>

  <div class="arena">
    <button class="card" id="cardA"></button>
    <div class="vs">VS</div>
    <button class="card" id="cardB"></button>
  </div>

  <div class="result" id="result"></div>
  <button class="next" id="next">Next ▸</button>

  <p class="note">
    Ratings here are <b>approximate placeholders</b>, not official data. To use real numbers,
    edit the <code>PLAYERS</code> list at the top of this file's script — each player is just
    <code>{name, pos, nat, OVR, PAC, SHO, PAS, DRI, DEF, PHY}</code>.
  </p>

<script>
(function(){
  "use strict";

  // ====================================================================
  //  EDIT ME — swap these for the real stats you pull.
  //  Each: name, position, nation code, then the six face stats + OVR.
  //  Values below are APPROXIMATE placeholders just so the game runs.
  // ====================================================================
  var PLAYERS = [
    {name:"Messi",      pos:"RW",  nat:"ARG", OVR:90, PAC:80, SHO:87, PAS:90, DRI:93, DEF:33, PHY:64},
    {name:"Ronaldo",    pos:"ST",  nat:"POR", OVR:88, PAC:81, SHO:90, PAS:78, DRI:84, DEF:34, PHY:75},
    {name:"Mbappé",     pos:"ST",  nat:"FRA", OVR:91, PAC:97, SHO:90, PAS:80, DRI:92, DEF:36, PHY:78},
    {name:"Haaland",    pos:"ST",  nat:"NOR", OVR:91, PAC:89, SHO:93, PAS:66, DRI:80, DEF:45, PHY:88},
    {name:"De Bruyne",  pos:"CM",  nat:"BEL", OVR:91, PAC:72, SHO:88, PAS:93, DRI:87, DEF:64, PHY:78},
    {name:"Vinícius Jr",pos:"LW",  nat:"BRA", OVR:89, PAC:95, SHO:83, PAS:78, DRI:90, DEF:29, PHY:68},
    {name:"Bellingham", pos:"CAM", nat:"ENG", OVR:87, PAC:78, SHO:80, PAS:84, DRI:85, DEF:78, PHY:82},
    {name:"Salah",      pos:"RW",  nat:"EGY", OVR:89, PAC:90, SHO:87, PAS:81, DRI:88, DEF:45, PHY:75},
    {name:"Kane",       pos:"ST",  nat:"ENG", OVR:90, PAC:70, SHO:91, PAS:84, DRI:82, DEF:47, PHY:83},
    {name:"Modrić",     pos:"CM",  nat:"CRO", OVR:87, PAC:72, SHO:76, PAS:88, DRI:87, DEF:72, PHY:65},
    {name:"Van Dijk",   pos:"CB",  nat:"NED", OVR:89, PAC:79, SHO:60, PAS:71, DRI:72, DEF:90, PHY:86},
    {name:"Rúben Dias", pos:"CB",  nat:"POR", OVR:88, PAC:62, SHO:39, PAS:66, DRI:68, DEF:89, PHY:84},
    {name:"Lewandowski",pos:"ST",  nat:"POL", OVR:90, PAC:75, SHO:91, PAS:79, DRI:85, DEF:44, PHY:82},
    {name:"Neymar",     pos:"LW",  nat:"BRA", OVR:87, PAC:85, SHO:83, PAS:85, DRI:91, DEF:36, PHY:60},
    {name:"Benzema",    pos:"ST",  nat:"FRA", OVR:89, PAC:78, SHO:88, PAS:83, DRI:87, DEF:39, PHY:78},
    {name:"Son",        pos:"LW",  nat:"KOR", OVR:87, PAC:88, SHO:87, PAS:81, DRI:85, DEF:43, PHY:70},
    {name:"Saka",       pos:"RW",  nat:"ENG", OVR:86, PAC:86, SHO:80, PAS:80, DRI:86, DEF:65, PHY:70},
    {name:"Rodri",      pos:"CDM", nat:"ESP", OVR:89, PAC:66, SHO:78, PAS:85, DRI:82, DEF:86, PHY:84},
    {name:"Kimmich",    pos:"CDM", nat:"GER", OVR:88, PAC:70, SHO:75, PAS:86, DRI:82, DEF:80, PHY:76},
    {name:"Foden",      pos:"CAM", nat:"ENG", OVR:87, PAC:82, SHO:82, PAS:84, DRI:89, DEF:60, PHY:64},
    {name:"Griezmann",  pos:"CF",  nat:"FRA", OVR:88, PAC:78, SHO:85, PAS:86, DRI:86, DEF:56, PHY:72},
    {name:"Osimhen",    pos:"ST",  nat:"NGA", OVR:88, PAC:90, SHO:87, PAS:70, DRI:82, DEF:42, PHY:84}
  ];

  var STATS = [
    {key:"OVR", label:"Overall"},
    {key:"PAC", label:"Pace"},
    {key:"SHO", label:"Shooting"},
    {key:"PAS", label:"Passing"},
    {key:"DRI", label:"Dribbling"},
    {key:"DEF", label:"Defending"},
    {key:"PHY", label:"Physical"}
  ];

  // ---------- state ----------
  var score=0, streak=0, best=0, round=null, locked=false;

  var $=function(id){return document.getElementById(id);};
  function rint(n){return Math.floor(Math.random()*n);}
  function initials(name){
    var parts=name.replace(/[^A-Za-zÀ-ÿ ]/g,'').trim().split(/\s+/);
    if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  }

  function newRound(){
    locked=false;
    var i=rint(PLAYERS.length), j;
    do{ j=rint(PLAYERS.length); }while(j===i);
    var stat=STATS[rint(STATS.length)];
    var mode=Math.random()<0.5 ? "more" : "less";
    round={a:PLAYERS[i], b:PLAYERS[j], stat:stat, mode:mode};
    render();
  }

  function cardHTML(p, statKey, reveal){
    var val = reveal ? p[statKey] : "?";
    return ''+
      '<div class="c-top">'+
        '<div class="pos">'+esc(p.pos)+'<small>position</small></div>'+
        '<div class="nation">'+esc(p.nat)+'</div>'+
      '</div>'+
      '<div class="avatar">'+esc(initials(p.name))+'</div>'+
      '<div class="name">'+esc(p.name)+'</div>'+
      '<div class="statbox">'+
        '<div class="sname">'+esc(currentStatLabel())+'</div>'+
        '<div class="sval '+(reveal?'pop':'q')+'">'+val+'</div>'+
      '</div>';
  }
  function currentStatLabel(){ return round ? round.stat.label : ''; }
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function render(){
    $('score').textContent=score;
    $('streak').textContent=streak;
    $('best').textContent=best;
    $('question').innerHTML='Tap the player with <span class="dir">'+round.mode.toUpperCase()+
                            '</span> <span class="stat">'+esc(round.stat.label)+'</span>';
    var A=$('cardA'), B=$('cardB');
    A.className='card'; B.className='card';
    A.innerHTML=cardHTML(round.a, round.stat.key, false);
    B.innerHTML=cardHTML(round.b, round.stat.key, false);
    $('result').textContent=''; $('result').className='result';
    $('next').classList.remove('show');
  }

  function choose(which){
    if(locked) return;
    locked=true;
    var key=round.stat.key;
    var va=round.a[key], vb=round.b[key];
    // which side does the question reward?
    var aWins = round.mode==="more" ? va>=vb : va<=vb;
    var bWins = round.mode==="more" ? vb>=va : vb<=va;
    var tie = va===vb; // both count on a tie
    var chosenCorrect = which==='a' ? (aWins||tie) : (bWins||tie);

    var A=$('cardA'), B=$('cardB');
    A.classList.add('locked'); B.classList.add('locked');
    A.innerHTML=cardHTML(round.a, key, true);
    B.innerHTML=cardHTML(round.b, key, true);

    // mark the actually-correct side green, the other red-ish only if user picked it wrong
    var correctSide = tie ? which : (round.mode==="more" ? (va>vb?'a':'b') : (va<vb?'a':'b'));
    (correctSide==='a'?A:B).classList.add('right');
    if(!chosenCorrect){ (which==='a'?A:B).classList.add('wrong'); }

    var res=$('result');
    if(chosenCorrect){
      score++; streak++; if(streak>best) best=streak;
      res.textContent = streak>=3 ? ('Correct! 🔥 '+streak+' in a row') : 'Correct!';
      res.className='result good';
    } else {
      streak=0;
      res.textContent='Wrong — '+round.a.name+' '+va+'  ·  '+round.b.name+' '+vb;
      res.className='result bad';
    }
    $('score').textContent=score;
    $('streak').textContent=streak;
    $('best').textContent=best;
    $('next').classList.add('show');
  }

  $('cardA').addEventListener('click',function(){choose('a');});
  $('cardB').addEventListener('click',function(){choose('b');});
  $('next').addEventListener('click',newRound);

  newRound();
})();

// ---- 16-bit kickabout: players chase and kick a ball ----
(function(){
  "use strict";

  // ---- 16-bit sprite (shaded) viewBox 0 0 18 26 ----

    '<svg viewBox="0 0 18 26" xmlns="http://www.w3.org/2000/svg">'+
      '<rect x="6" y="0" width="6" height="1" fill="#1a1208"/>'+              /* hair top */
      '<rect x="5" y="1" width="8" height="2" fill="#2c1f10"/>'+             /* hair */

      '<rect x="11" y="3" width="1" height="4" fill="#d6a974"/>'+           /* face shade */
      '<rect x="7" y="5" width="1" height="1" fill="#26190d"/>'+            /* eye */
      '<rect x="10" y="5" width="1" height="1" fill="#26190d"/>'+           /* eye */
      '<rect class="kitc" x="4" y="7" width="10" height="7"/>'+             /* shirt */
      '<rect class="kitsh" x="11" y="7" width="3" height="7"/>'+            /* shirt shade */
      '<rect x="7" y="7" width="4" height="1" fill="#ffffff"/>'+            /* collar */
      '<rect x="8" y="9" width="2" height="3" fill="#ffffff" opacity=".85"/>'+ /* number patch */
      '<rect class="kitc" x="2" y="7" width="2" height="5"/>'+              /* L sleeve */
      '<rect class="kitsh" x="14" y="7" width="2" height="5"/>'+            /* R sleeve */
      '<rect x="2" y="12" width="2" height="2" fill="#f1c592"/>'+           /* L hand */
      '<rect x="14" y="12" width="2" height="2" fill="#e0b07c"/>'+          /* R hand */
      '<rect x="4" y="14" width="10" height="3" fill="#f2f2f2"/>'+          /* shorts */
      '<rect x="4" y="16" width="10" height="1" fill="#c9cdd0"/>'+          /* shorts shade */
      '<g class="leg-a">'+
        '<rect class="sockc" x="5" y="17" width="3" height="5"/>'+
        '<rect class="sockc" x="10" y="17" width="3" height="5"/>'+
        '<rect x="6" y="18" width="3" height="1" fill="#ffffff" opacity=".5"/>'+ /* sock band */
        '<rect x="11" y="18" width="2" height="1" fill="#ffffff" opacity=".5"/>'+
        '<rect x="4" y="22" width="5" height="2" fill="#141414"/>'+          /* boot */
        '<rect x="10" y="22" width="5" height="2" fill="#141414"/>'+
        '<rect x="4" y="22" width="1" height="1" fill="#3a3a3a"/>'+
        '<rect x="10" y="22" width="1" height="1" fill="#3a3a3a"/>'+
      '</g>'+
      '<g class="leg-b">'+
        '<rect class="sockc" x="3" y="17" width="3" height="5"/>'+
        '<rect class="sockc" x="12" y="17" width="3" height="5"/>'+
        '<rect x="4" y="18" width="2" height="1" fill="#ffffff" opacity=".5"/>'+
        '<rect x="12" y="18" width="3" height="1" fill="#ffffff" opacity=".5"/>'+
        '<rect x="2" y="22" width="5" height="2" fill="#141414"/>'+
        '<rect x="12" y="22" width="5" height="2" fill="#141414"/>'+
        '<rect x="2" y="22" width="1" height="1" fill="#3a3a3a"/>'+
        '<rect x="12" y="22" width="1" height="1" fill="#3a3a3a"/>'+
      '</g>'+
    '</svg>';
  var BALL =
    '<svg viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg">'+
      '<rect x="2" y="0" width="4" height="8" fill="#f8f8f8"/>'+
      '<rect x="0" y="2" width="8" height="4" fill="#f8f8f8"/>'+
      '<rect x="1" y="1" width="2" height="2" fill="#ffffff"/>'+
      '<rect x="3" y="3" width="2" height="2" fill="#1c1c1c"/>'+         /* centre pentagon */
      '<rect x="5" y="1" width="1" height="1" fill="#1c1c1c"/>'+
      '<rect x="1" y="5" width="1" height="1" fill="#1c1c1c"/>'+
      '<rect x="6" y="5" width="1" height="1" fill="#cfcfcf"/>'+
    '</svg>';

  // two kits, each with a darker shade tone
  var TEAMS = [
    {kit:'#f5c542', kitsh:'#c79a26', sock:'#1b1207'},  // amber
    {kit:'#1f9fd0', kitsh:'#157399', sock:'#0b2230'}   // blue
  ];

  var match = document.getElementById('match');
  if(!match) return;

  var SPRITE_W = 44, SPRITE_H = 44*(26/18); // keep aspect
  var BALL_W = 14;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function rand(a,b){return a+Math.random()*(b-a);}

  // ---- field bounds ----
  var W,H,PAD=46;
  function measure(){ W=window.innerWidth; H=window.innerHeight; }
  measure(); window.addEventListener('resize', measure);

  // ---- build players ----
  var NUM = 6;
  var players = [];
  for(var i=0;i<NUM;i++){
    var team = TEAMS[i%2];
    var el = document.createElement('div'); el.className='player';
    el.style.setProperty('--kit', team.kit);
    el.style.setProperty('--kitsh', team.kitsh);
    el.style.setProperty('--sock', team.sock);
    var flip = document.createElement('div'); flip.className='flip';
    flip.innerHTML = SPRITE; el.appendChild(flip);
    match.appendChild(el);
    players.push({
      el:el, flip:flip,
      x:rand(PAD, (W||800)-PAD), y:rand(PAD,(H||600)-PAD),
      vx:0, vy:0, speed:rand(1.6,2.5), cool:0, face:1, running:false
    });
  }

  // ---- build ball ----
  var bEl = document.createElement('div'); bEl.className='ball'; bEl.innerHTML=BALL;
  match.appendChild(bEl);
  var ball = {x:(W||800)/2, y:(H||600)/2, vx:rand(-4,4), vy:rand(-4,4)};

  function place(el,x,y,w,h,extra){
    el.style.transform = 'translate('+(x-w/2)+'px,'+(y-h/2)+'px)'+(extra||'');
  }

  // ---- reduced motion: drop them in and stop ----
  if(reduce){
    players.forEach(function(p){ place(p.el,p.x,p.y,SPRITE_W,SPRITE_H); });
    place(bEl, ball.x, ball.y, BALL_W, BALL_W);
    return;
  }

  function step(){
    // --- ball physics ---
    ball.x += ball.vx; ball.y += ball.vy;
    ball.vx *= 0.971; ball.vy *= 0.971;
    if(ball.x < PAD){ ball.x=PAD; ball.vx=Math.abs(ball.vx)*0.7; }
    if(ball.x > W-PAD){ ball.x=W-PAD; ball.vx=-Math.abs(ball.vx)*0.7; }
    if(ball.y < PAD){ ball.y=PAD; ball.vy=Math.abs(ball.vy)*0.7; }
    if(ball.y > H-PAD){ ball.y=H-PAD; ball.vy=-Math.abs(ball.vy)*0.7; }
    // keep the game alive if the ball nearly stops
    var bs = Math.hypot(ball.vx,ball.vy);
    if(bs < 0.25){ var a=rand(0,6.28); ball.vx=Math.cos(a)*rand(2.5,4.5); ball.vy=Math.sin(a)*rand(2.5,4.5); }

    // --- players ---
    for(var i=0;i<players.length;i++){
      var p=players[i];
      var dx=ball.x-p.x, dy=ball.y-p.y;
      var d=Math.hypot(dx,dy)||1;
      // seek the ball, with a touch of wander
      var tx=dx/d, ty=dy/d;
      p.vx += (tx*p.speed - p.vx)*0.18 + rand(-0.12,0.12);
      p.vy += (ty*p.speed - p.vy)*0.18 + rand(-0.12,0.12);
      p.x += p.vx; p.y += p.vy;
      if(p.x<PAD)p.x=PAD; if(p.x>W-PAD)p.x=W-PAD;
      if(p.y<PAD)p.y=PAD; if(p.y>H-PAD)p.y=H-PAD;

      // kick if close and off cooldown
      if(d < 24 && p.cool<=0){
        var ang = Math.atan2(dy,dx) + rand(-0.7,0.7);
        var pow = rand(5.5,9);
        ball.vx = Math.cos(ang)*pow; ball.vy = Math.sin(ang)*pow;
        p.cool = 18;
      }
      if(p.cool>0) p.cool--;

      // facing + leg animation
      var sp = Math.hypot(p.vx,p.vy);
      var want = sp>0.35;
      if(want!==p.running){ p.running=want; p.el.classList.toggle('running', want); }
      if(p.vx < -0.15 && p.face!==-1){ p.face=-1; p.flip.style.transform='scaleX(-1)'; }
      else if(p.vx > 0.15 && p.face!==1){ p.face=1; p.flip.style.transform='scaleX(1)'; }

      place(p.el, p.x, p.y, SPRITE_W, SPRITE_H);
    }

    place(bEl, ball.x, ball.y, BALL_W, BALL_W);
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
